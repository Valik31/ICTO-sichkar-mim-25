<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Великий адронний колайдер MindAR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.min.js"></script>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: atlas.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
        <a-entity scale="0.5 0.5 0.5" rotation="-90 0 0">
            
            <a-light type="ambient" color="#888" intensity="3"></a-light>
            <a-light type="point" position="0 2 2" color="#FFF" intensity="15" decay="0"></a-light>
            
            <a-entity position="0 1.5 0">
            
                <a-torus radius="2" radius-tubular="0.1" material="color: #4CC3D9; transparent: true; opacity: 0.3"></a-torus>

                <a-entity animation="property: rotation; from: 0 0 0; to: 0 0 85.7; dur: 2500; loop: true; easing: linear">
                    <a-sphere position="2 0 0" radius="0.15" color="#FF0000"></a-sphere>
                </a-entity>

                <a-entity animation="property: rotation; from: 0 0 180; to: 0 0 94.3; dur: 2500; loop: true; easing: linear">
                    <a-sphere position="2 0 0" radius="0.15" color="#0000FF"></a-sphere>
                </a-entity>
                
            </a-entity>
        </a-entity>
    </a-entity>
  </a-scene>
</body>
</html>
