<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR з A-Frame (Частина 2)</title>
    <script src="../aframe/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body>
    <a-scene vr-mode-ui = "enabled: false" renderer = "logarithmicDeptBuffer: true" embedded 
         arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
      
      <a-marker preset="hiro"> 
        <a-entity rotation = "0 -90 0" gltf-model="../models/waffle.glb"
        animation = "property:rotation; to: 360 0 0; loop: true; dur: 5000"></a-entity>
      </a-marker>

      <a-marker preset="kanji"> 
        <a-entity rotation = "90 180 0" gltf-model="../models/apple.glb"
        animation = "property:scale; to: 2 2 2; loop: true; dir: alternate; dur: 5000"
        ></a-entity>
      </a-marker>

      <a-marker type= "pattern" url="pattern-marker-sun.patt"> 
        <a-box color = "yellow"
        animation="property:material.color; type: color; from: #FFFF00; to: #0000FF; loop: true; dir: alternate; dur: 10000">
        ></a-box>
      </a-marker>

    <a-entity camera></a-entity>

    </a-scene>
  </body>


  </html>
